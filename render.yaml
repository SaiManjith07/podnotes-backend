services:
  - type: web
    name: podcast-pal-backend
    runtime: python
    plan: free
    rootDir: .
    autoDeploy: true
    # Build steps:
    # - confirm python/pip
    # - download portable ffmpeg to .render-bin (Render native can't apt-get)
    # - install python deps
    buildCommand: >
      bash -lc 'set -euxo pipefail;
      python --version;
      python -m pip --version;
      mkdir -p .render-bin;
      if [ ! -x .render-bin/ffmpeg ]; then
        curl -L -o ffmpeg.tar.xz "https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz";
        tar -xf ffmpeg.tar.xz;
        dir="$(find . -maxdepth 1 -type d -name "ffmpeg-*-amd64-static" | head -n 1)";
        test -n "$dir";
        mv "$dir/ffmpeg" .render-bin/ffmpeg;
        mv "$dir/ffprobe" .render-bin/ffprobe || true;
        chmod +x .render-bin/ffmpeg .render-bin/ffprobe || true;
        rm -rf "$dir" ffmpeg.tar.xz;
      fi;
      .render-bin/ffmpeg -version;
      python -m pip install --upgrade pip setuptools wheel;
      python -m pip install --prefer-binary -r requirements.txt;
      python -m pip show uvicorn'
    # Ensure runtime venv has deps before boot (fixes intermittent "No module named uvicorn" on new instances).
    startCommand: >
      bash -lc 'export PATH="$PWD/.render-bin:$PATH";
      python -m pip install --disable-pip-version-check --prefer-binary -r requirements.txt;
      exec python -m uvicorn main:app --host 0.0.0.0 --port "$PORT"'
    healthCheckPath: /api/podcast/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: WHISPER_MODEL_SIZE
        value: base
      - key: CORS_ORIGINS
        sync: false
      - key: NOTES_TRANSCRIPT_MAX_CHARS
        value: "24000"
      - key: NOTE_CHAT_TRANSCRIPT_MAX_CHARS_BRIEF
        value: "6000"
      - key: NOTE_CHAT_TRANSCRIPT_MAX_CHARS
        value: "28000"
      - key: NOTE_CHAT_MAX_OUTPUT_TOKENS_BRIEF
        value: "700"
      - key: NOTE_CHAT_MAX_OUTPUT_TOKENS_EXPANDED
        value: "1400"